name = "bv-awal-generator"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "bv_awal_db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "FILES"
bucket_name = "bv-awal-files"

[ai]
binding = "AI"

[vars]
# Set real secrets with: wrangler secret put ANTHROPIC_API_KEY
